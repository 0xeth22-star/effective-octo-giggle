<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bitkin Run</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:#1a1c2a;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
#wrap { position:relative; }
#c {
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:pointer;
}
#walletInput {
  position:fixed;
  background:#c8d0d8;
  border:3px solid #2d3154;
  color:#2d3154;
  font-family:monospace;
  font-weight:bold;
  text-align:center;
  display:none;
  outline:none;
  letter-spacing:1px;
  padding:2px 6px;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <input id="walletInput" type="text" placeholder="0x..."
         maxlength="42" autocomplete="off" autocorrect="off" spellcheck="false"/>
</div>
<script>
'use strict';

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const GATE_TWEET_URL = 'https://twitter.com/Bitkinart';

// ═══════════════════════════════════════════════
// STATE MACHINE — declared first to avoid TDZ
// ═══════════════════════════════════════════════
let gs = 'GATE'; // GATE SELECT COUNTDOWN PLAYING DEAD GTD SCORE

// ═══════════════════════════════════════════════
// PALETTE (1-bit Bitkin)
// ═══════════════════════════════════════════════
const DA = '#2d3154';
const MI = '#6b7499';
const LI = '#c8d0d8';
const WH = '#ffffff';

// ═══════════════════════════════════════════════
// CANVAS — logical 480×164, scaled to screen
// ═══════════════════════════════════════════════
const LW = 480, LH = 164;
const screen = document.getElementById('c');
const sctx   = screen.getContext('2d');
sctx.imageSmoothingEnabled = false;

const oc  = document.createElement('canvas');
oc.width  = LW; oc.height = LH;
const ctx = oc.getContext('2d');
ctx.imageSmoothingEnabled = false;

const walletEl = document.getElementById('walletInput');

let SCALE = 1;
function resize() {
  SCALE = Math.min(window.innerWidth / LW, window.innerHeight / LH);
  screen.width  = Math.round(LW * SCALE);
  screen.height = Math.round(LH * SCALE);
  if (gs === 'GTD') posWallet();
}
resize();
window.addEventListener('resize', resize);

function blit() { sctx.drawImage(oc, 0, 0, screen.width, screen.height); }

function go(s) { gs = s; onEnter(s); }

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
const IN = { jump: false, duck: false, _pj: false };
let justJump = false;

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp')
    { IN.jump = true; e.preventDefault(); }
  if (e.code === 'ArrowDown') { IN.duck = true; e.preventDefault(); }
  if (e.code === 'Space' || e.code === 'Enter') {
    if (gs === 'DEAD' && deadReady) go('COUNTDOWN');
    if (gs === 'SCORE') go('COUNTDOWN');
    if (gs === 'SELECT' && !CHARS[selChar].locked) go('COUNTDOWN');
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') IN.jump = false;
  if (e.code === 'ArrowDown') IN.duck = false;
});

function tickIN() {
  justJump = IN.jump && !IN._pj;
  IN._pj = IN.jump;
}

// ═══════════════════════════════════════════════
// PIXEL HELPERS
// ═══════════════════════════════════════════════
const P = 2;

function fl(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }

function sp(ox, oy) {
  return (x, y, w, h, c) => {
    ctx.fillStyle = c || DA;
    ctx.fillRect(ox + x * P, oy + y * P, w * P, h * P);
  };
}

// ═══════════════════════════════════════════════
// CHARACTER DRAW FNs
// ═══════════════════════════════════════════════
function drawPoker(ox, oy, fr, st) {
  const s = sp(ox, oy);
  s(2,-2,6,1,LI); s(1,-1,1,1,MI); s(8,-1,1,1,MI);
  if (st === 'duck') {
    s(0,0,10,1,DA); s(1,1,8,3,DA);
    s(1,2,3,1,MI); s(5,2,3,1,MI);
    s(0,4,10,2,DA); s(3,4,4,2,LI);
    s(1,6,3,2,DA); s(5,6,3,2,DA);
    s(0,7,3,1,DA); s(6,7,3,1,DA);
    return;
  }
  s(2,0,6,2,DA); s(1,0,1,3,DA); s(8,0,1,3,DA);
  if (st === 'dead') {
    s(2,1,6,5,DA);
    s(2,2,1,1,LI); s(4,2,1,1,LI); s(3,3,1,1,LI);
    s(6,2,1,1,LI); s(8,2,1,1,LI); s(7,3,1,1,LI);
    s(3,5,4,1,DA); s(4,5,2,1,LI);
    s(1,6,8,4,DA); s(3,6,4,4,LI);
    s(0,6,1,3,DA); s(9,6,1,3,DA);
    s(2,10,3,2,DA); s(6,9,3,2,DA);
    return;
  }
  s(2,1,6,4,DA);
  s(2,2,3,2,MI); s(6,2,3,2,MI); s(5,2,1,1,DA);
  s(4,5,2,1,DA);
  s(1,6,8,3,DA); s(4,6,2,3,LI);
  fr===0 ? (s(0,6,1,3,DA), s(9,7,1,3,DA)) : (s(0,7,1,3,DA), s(9,6,1,3,DA));
  if (fr===0) {
    s(2,9,2,4,DA); s(6,9,2,2,DA);
    s(1,12,3,1,DA); s(6,11,2,1,DA);
  } else {
    s(4,9,2,4,DA); s(2,9,2,2,DA);
    s(4,12,3,1,DA); s(1,11,2,1,DA);
  }
}

function drawSpiky(ox, oy, fr, st) {
  const s = sp(ox, oy);
  if (st === 'duck') {
    s(1,0,8,1,DA); s(3,-1,1,1,DA); s(6,-1,1,1,DA);
    s(1,1,8,3,LI); s(1,1,1,3,DA); s(8,1,1,3,DA);
    s(1,1,8,1,DA); s(1,3,8,1,DA);
    s(2,2,2,1,MI); s(6,2,2,1,MI);
    s(1,4,8,2,LI); s(1,4,1,2,DA); s(8,4,1,2,DA);
    s(1,4,8,1,DA); s(1,5,8,1,DA); s(3,4,4,2,DA);
    s(1,6,3,2,LI); s(5,6,3,2,LI);
    s(1,6,1,2,DA); s(3,6,1,2,DA); s(5,6,1,2,DA); s(7,6,1,2,DA);
    return;
  }
  s(3,-2,1,3,DA); s(1,-1,2,1,DA); s(6,-1,2,1,DA);
  s(5,-2,1,1,DA); s(1,0,8,1,DA);
  if (st === 'dead') {
    s(1,1,8,4,LI); s(1,1,1,4,DA); s(8,1,1,4,DA);
    s(1,1,8,1,DA); s(1,4,8,1,DA);
    s(2,2,1,1,DA); s(4,2,1,1,DA); s(3,3,1,1,DA);
    s(6,2,1,1,DA); s(8,2,1,1,DA); s(7,3,1,1,DA);
    s(3,3,4,1,DA); s(4,3,2,1,LI);
    s(1,5,8,4,LI); s(1,5,1,4,DA); s(8,5,1,4,DA); s(3,5,4,4,DA);
    s(0,5,1,3,DA); s(9,6,1,3,DA);
    s(2,9,3,3,DA); s(6,8,3,3,DA);
    return;
  }
  s(1,1,8,4,LI); s(1,1,1,4,DA); s(8,1,1,4,DA);
  s(1,1,8,1,DA); s(1,4,8,1,DA);
  s(2,2,2,1,DA); s(6,2,2,1,DA); s(4,2,2,1,MI);
  s(3,3,3,1,DA); s(4,3,1,1,LI);
  s(4,5,2,1,DA);
  s(1,6,8,3,LI); s(1,6,1,3,DA); s(8,6,1,3,DA);
  s(1,6,8,1,DA); s(1,8,8,1,DA); s(3,6,4,3,DA);
  fr===0 ? (s(0,6,1,3,DA), s(9,7,1,3,DA)) : (s(0,7,1,3,DA), s(9,6,1,3,DA));
  if (fr===0) {
    s(2,9,2,4,LI); s(2,9,1,4,DA); s(3,9,1,4,DA);
    s(6,9,2,2,LI); s(6,9,1,2,DA); s(7,9,1,2,DA); s(1,12,3,1,DA);
  } else {
    s(4,9,2,4,LI); s(4,9,1,4,DA); s(5,9,1,4,DA);
    s(2,9,2,2,LI); s(2,9,1,2,DA); s(3,9,1,2,DA); s(4,12,3,1,DA);
  }
}

function drawPriestess(ox, oy, fr, st) {
  const s = sp(ox, oy);
  s(3,-3,4,2,DA); s(2,-2,6,2,DA);
  if (st === 'duck') {
    s(2,0,6,3,DA);
    s(2,1,2,1,MI); s(6,1,2,1,MI); s(4,1,2,1,DA);
    s(1,0,1,1,DA); s(8,0,1,1,DA);
    s(1,1,1,2,MI); s(8,1,1,2,MI);
    s(0,3,10,3,DA); s(3,3,4,3,MI);
    s(1,6,3,2,DA); s(5,6,3,2,DA);
    return;
  }
  s(2,0,6,4,DA);
  s(2,1,2,1,MI); s(6,1,2,1,MI); s(4,1,2,1,DA);
  s(1,0,1,1,DA); s(8,0,1,1,DA);
  s(1,1,1,3,MI); s(8,1,1,3,MI);
  if (st === 'dead') {
    s(2,1,1,1,LI); s(4,1,1,1,LI); s(3,2,1,1,LI);
    s(6,1,1,1,LI); s(8,1,1,1,LI); s(7,2,1,1,LI);
  }
  s(4,4,2,1,DA);
  s(2,5,6,5,DA); s(1,6,8,3,DA); s(4,5,2,5,MI);
  fr===0 ? (s(0,6,2,2,DA), s(8,5,2,2,DA)) : (s(0,5,2,2,DA), s(8,6,2,2,DA));
  if (fr===0) {
    s(2,10,3,4,DA); s(5,10,3,3,DA); s(1,13,4,1,DA);
  } else {
    s(5,10,3,4,DA); s(2,10,3,3,DA); s(5,13,4,1,DA);
  }
}

function drawMedKin(ox, oy, fr, st) {
  const s = sp(ox, oy);
  s(0,0,10,2,DA); s(1,-1,8,1,DA); s(2,-2,2,1,DA); s(6,-2,2,1,DA);
  if (st === 'duck') {
    s(2,2,6,3,DA);
    s(2,3,2,2,LI); s(2,3,1,2,DA); s(3,3,1,2,DA);
    s(2,3,2,1,DA); s(2,4,2,1,DA);
    s(6,3,2,2,LI); s(6,3,1,2,DA); s(7,3,1,2,DA);
    s(6,3,2,1,DA); s(6,4,2,1,DA); s(4,4,2,1,DA);
    s(2,3,2,1,MI); s(6,3,2,1,MI);
    s(1,5,8,3,DA); s(0,6,10,2,DA); s(4,5,2,3,MI);
    s(1,8,3,2,DA); s(5,8,3,2,DA);
    return;
  }
  s(2,2,6,4,DA);
  s(2,3,2,2,LI); s(2,3,1,2,DA); s(3,3,1,2,DA); s(2,3,2,1,DA); s(2,4,2,1,DA);
  s(6,3,2,2,LI); s(6,3,1,2,DA); s(7,3,1,2,DA); s(6,3,2,1,DA); s(6,4,2,1,DA);
  s(4,4,2,1,DA);
  s(2,3,2,1,MI); s(6,3,2,1,MI);
  if (st === 'dead') {
    s(2,3,1,1,DA); s(4,3,1,1,DA); s(3,4,1,1,DA);
    s(6,3,1,1,DA); s(8,3,1,1,DA); s(7,4,1,1,DA);
  }
  s(4,6,2,1,DA);
  s(2,7,6,4,DA); s(1,8,8,3,DA); s(4,7,2,4,MI);
  fr===0 ? (s(0,8,2,2,DA), s(8,7,2,2,DA)) : (s(0,7,2,2,DA), s(8,8,2,2,DA));
  if (fr===0) {
    s(2,11,3,3,DA); s(5,11,3,2,DA); s(1,13,4,1,DA);
  } else {
    s(5,11,3,3,DA); s(2,11,3,2,DA); s(5,13,4,1,DA);
  }
}

const DRAW = [drawPoker, drawSpiky, drawPriestess, drawMedKin];
const CH = 28, CW = 20;

// ═══════════════════════════════════════════════
// CHARACTERS
// ═══════════════════════════════════════════════
const CHARS = [
  { name: 'Poker Kin',       locked: false },
  { name: 'Spiky Kin',       locked: false },
  { name: 'The Priestess',   locked: false },
  { name: 'Meditation Kin',  locked: true  },
];
let selChar = 0;

// ═══════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════
const GY = 128;

const PL = {
  x: 62, y: 0, vy: 0,
  onGround: true, ducking: false,
  fr: 0, frt: 0,

  get h() { return this.ducking ? 16 : CH; },
  get hbox() {
    const pad = 5;
    return { x: this.x+pad, y: this.y+pad, w: CW-pad*2, h: this.h-pad*2 };
  },

  reset() {
    this.y = GY-CH; this.vy = 0;
    this.onGround = true; this.ducking = false;
    this.fr = 0; this.frt = 0;
  },
  jump() {
    if (this.onGround && !this.ducking) { this.vy = -12.5; this.onGround = false; }
  },
  setDuck(v) {
    if (!this.onGround) return;
    this.ducking = v; this.y = GY - this.h;
  },
  update(spd) {
    if (!this.onGround) {
      this.vy += 0.7; this.y += this.vy;
      if (this.y >= GY - this.h) { this.y = GY - this.h; this.onGround = true; this.vy = 0; }
    }
    this.frt++;
    if (this.frt >= Math.max(4, 14 - Math.floor(spd))) { this.frt = 0; this.fr = (this.fr+1)%2; }
  },
  draw(st) { DRAW[selChar](this.x, this.y, this.fr, st || 'run'); }
};

// ═══════════════════════════════════════════════
// OBSTACLES
// ═══════════════════════════════════════════════
let obs = [], obsPool = [], spawnT = 60;
let birdsOn = false, dbOn = false;

function mkObs() {
  const pool = ['s','m','l'];
  if (dbOn)    pool.push('d');
  if (birdsOn) { pool.push('bl','bl','bh'); }
  const t = pool[Math.floor(Math.random()*pool.length)];
  const o = obsPool.pop() || {};
  o.type = t; o.x = LW+10; o.dead = false; o.ff = 0; o.ft = 0;
  switch(t){
    case 's':  o.w=12; o.h=28; o.y=GY-28; break;
    case 'm':  o.w=14; o.h=40; o.y=GY-40; break;
    case 'l':  o.w=16; o.h=54; o.y=GY-54; break;
    case 'd':  o.w=36; o.h=32; o.y=GY-32; break;
    case 'bl': o.w=26; o.h=14; o.y=GY-42; break;
    case 'bh': o.w=26; o.h=14; o.y=GY-78; break;
  }
  obs.push(o);
}

function drawObs(o) {
  if (o.type === 'bl' || o.type === 'bh') {
    o.ft++; if (o.ft > 7) { o.ft = 0; o.ff = (o.ff+1)%2; }
    const { x, y } = o;
    fl(x+6,  y+4, 16, 8,  DA);
    fl(x+18, y+2, 8,  8,  DA);
    fl(x+24, y+4, 4,  3,  DA);
    fl(x+20, y+3, 3,  3,  LI);
    fl(x+21, y+4, 2,  2,  DA);
    fl(x, o.ff===0 ? y : y+8, 14, 5, DA);
    fl(x+2, y+8, 6, 4, DA);
  } else {
    const { x, y, w, h, type } = o;
    fl(x, y, w, h, DA);
    fl(x, y, w, 2, MI); fl(x, y, 2, h, MI);
    fl(x+2, y+h-2, w-2, 2, DA);
    ctx.fillStyle = MI;
    for (let iy=y+4; iy<y+h-4; iy+=5)
      for (let ix=x+4; ix<x+w-4; ix+=5)
        ctx.fillRect(ix, iy, 2, 2);
    if (type === 'd') {
      fl(x+22, y+5, 14, h-5, DA);
      fl(x+22, y+5, 14, 2, MI);
      fl(x+22, y+5, 2, h-5, MI);
    }
  }
}

function hitTest(o) {
  const h = PL.hbox, p = 3;
  return h.x < o.x+o.w-p && h.x+h.w > o.x+p &&
         h.y < o.y+o.h-p && h.y+h.h > o.y+p;
}

// ═══════════════════════════════════════════════
// SCORE & PROGRESSION
// ═══════════════════════════════════════════════
let score = 0, spd = 4;
let hiScore = parseInt(localStorage.getItem('bk_hi') || '0');
let mile = {}, gtdDone = false;
let mTxt = '', mTimer = 0;

function tickScore() {
  score += spd * 0.042;
  spd = Math.min(20, 4 + score / 380);
  const sc = Math.floor(score);
  if (sc >= 100 && !mile[100]) { mile[100]=true; mTxt='100!'; mTimer=80; }
  if (sc >= 200 && !mile[200]) { mile[200]=true; birdsOn=true; mTxt='200 — BIRDS IN!'; mTimer=80; }
  if (sc >= 300 && !mile[300]) { mile[300]=true; dbOn=true; mTxt='300 — MAX DANGER!'; mTimer=80; }
  if (sc >= 500 && !mile[500]) {
    mile[500]=true; CHARS[3].locked=false;
    localStorage.setItem('bk_mk','1');
    mTxt='KIN UNLOCKED!'; mTimer=100;
  }
  if (sc >= 1000 && !gtdDone) { gtdDone=true; go('GTD'); }
}

// ═══════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════
let bgDots = [], gOff = 0;

function initBg() {
  bgDots = Array.from({length:26}, () => ({
    x: Math.random()*LW, y: 4+Math.random()*(GY-18),
    sz: Math.random()<0.4?2:1, sp: 0.18+Math.random()*0.3
  }));
}

function drawBg() {
  fl(0, 0, LW, LH, LI);
  ctx.fillStyle = MI;
  for (let x=0; x<LW; x+=6)
    for (let y=6; y<GY-8; y+=8)
      if ((x+y)%8===0) ctx.fillRect(x, y, 1, 1);
  bgDots.forEach(d => {
    fl(d.x, d.y, d.sz, d.sz, MI);
    d.x -= d.sp*(spd/4);
    if (d.x < -4) { d.x = LW+4; d.y = 4+Math.random()*(GY-18); }
  });
}

function drawGround() {
  fl(0, GY, LW, LH-GY, DA);
  fl(0, GY, LW, 2, LI);
  ctx.fillStyle = MI;
  for (let x=(gOff%22); x<LW; x+=22) ctx.fillRect(x, GY+5, 11, 1);
}

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function drawHUD() {
  ctx.textBaseline = 'top'; ctx.textAlign = 'right';
  ctx.font = 'bold 9px monospace';
  ctx.fillStyle = MI;
  ctx.fillText(`HI ${String(hiScore).padStart(5,'0')}`, LW-8, 7);
  ctx.fillStyle = DA;
  ctx.fillText(String(Math.floor(score)).padStart(5,'0'), LW-8-70, 7);
  if (mTimer > 0) {
    mTimer--;
    if (mTimer > 20 || mTimer%4 < 2) {
      ctx.fillStyle = DA; ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(mTxt, LW/2, 7);
    }
  }
}

function drawGame(pst) {
  drawBg(); drawGround();
  obs.forEach(drawObs);
  PL.draw(pst);
  drawHUD();
}

// ═══════════════════════════════════════════════
// TEXT HELPER
// ═══════════════════════════════════════════════
function txt(str, x, y, font, color, align, base) {
  ctx.font = font || 'bold 10px monospace';
  ctx.fillStyle = color || DA;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = base || 'middle';
  ctx.fillText(str, x, y);
}

// ═══════════════════════════════════════════════
// GATE SCREEN
// ═══════════════════════════════════════════════
let gBtn = {}, gdBtn = {};

function drawGate() {
  fl(0,0,LW,LH,LI);
  fl(0,0,LW,3,DA); fl(0,LH-3,LW,3,DA); fl(0,0,3,LH,DA); fl(LW-3,0,3,LH,DA);

  txt('BITKIN RUN', LW/2, 30, 'bold 26px monospace');
  txt('1-BIT · ENDLESS · FREE', LW/2, 52, '10px monospace', MI);
  fl(LW/2-90, 62, 180, 1, MI);

  txt('STEP 1 — LIKE & RT THE POST', LW/2, 76, 'bold 11px monospace');
  txt('to unlock the game', LW/2, 90, '9px monospace', MI);

  const bw=170, bh=22, bx=LW/2-bw/2, by=100;
  fl(bx, by, bw, bh, DA);
  txt('OPEN TWEET →', LW/2, by+11, 'bold 11px monospace', LI);
  gBtn = { x:bx, y:by, w:bw, h:bh };

  fl(LW/2-90, 130, 180, 1, MI);
  txt("STEP 2 — I'VE DONE IT", LW/2, 141, 'bold 11px monospace');

  const b2w=160, b2h=18, b2x=LW/2-b2w/2, b2y=150;
  fl(b2x, b2y, b2w, b2h, MI);
  txt("ENTER GAME  ✓", LW/2, b2y+9, 'bold 9px monospace', LI);
  gdBtn = { x:b2x, y:b2y, w:b2w, h:b2h };
}

// ═══════════════════════════════════════════════
// SELECT SCREEN
// ═══════════════════════════════════════════════
let selAnim = 0, cBoxes = [{},{},{},{}];

function drawSelect() {
  fl(0,0,LW,LH,LI);
  selAnim++;
  txt('SELECT YOUR KIN', LW/2, 14, 'bold 12px monospace');
  ctx.font = '9px monospace'; ctx.fillStyle = MI;
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillText(`HI ${String(hiScore).padStart(5,'0')}`, LW-8, 8);
  fl(0, 24, LW, 1, DA);

  const gap = LW/4;
  CHARS.forEach((ch, i) => {
    const cx = gap*i+gap/2, cy = 50;
    const isSel = i===selChar, isLk = ch.locked;
    const bounce = isSel ? Math.round(Math.sin(selAnim*0.1)*3) : 0;
    cBoxes[i] = { x:cx-22, y:cy-6, w:44, h:CH+24 };
    if (isSel) fl(cx-20, cy-4, 40, 2, DA);
    if (isLk) {
      txt('🔒', cx, cy+14, '20px monospace', MI, 'center', 'middle');
      txt('500 PTS', cx, cy+30, '6px monospace', MI);
    } else {
      DRAW[i](cx-CW/2, cy+bounce, selAnim%8<4?0:1, 'idle');
    }
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.font = isSel?'bold 7px monospace':'7px monospace';
    ctx.fillStyle = isSel?DA:MI;
    ctx.fillText(ch.name.toUpperCase(), cx, cy+CH+5);
  });

  fl(0, LH-20, LW, 1, DA);
  txt('TAP A KIN TO RUN · SPACE TO GO', LW/2, LH-5, 'bold 8px monospace', DA, 'center', 'bottom');
}

// ═══════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════
let cdN = 3, cdT = 0;

function tickCD() {
  cdT++;
  if (cdT >= 55) { cdT=0; cdN--; if (cdN<=0) go('PLAYING'); }
}

function drawCD() {
  drawGame('idle');
  const sz = 30;
  fl(LW/2-sz/2, LH/2-sz/2, sz, sz, LI);
  fl(LW/2-sz/2, LH/2-sz/2, sz, 2, DA);
  fl(LW/2-sz/2, LH/2+sz/2-2, sz, 2, DA);
  fl(LW/2-sz/2, LH/2-sz/2, 2, sz, DA);
  fl(LW/2+sz/2-2, LH/2-sz/2, 2, sz, DA);
  txt(cdN, LW/2, LH/2+1, 'bold 24px monospace');
}

// ═══════════════════════════════════════════════
// DEAD SCREEN
// ═══════════════════════════════════════════════
let deadT = 0, deadReady = false;
let retBtn = {}, shrBtn = {};

function drawDead() {
  drawGame('dead');
  if (!deadReady) return;
  const pw=230, ph=96, px2=LW/2-pw/2, py2=LH/2-ph/2;
  fl(px2, py2, pw, ph, LI);
  fl(px2, py2, pw, 2, DA); fl(px2, py2+ph-2, pw, 2, DA);
  fl(px2, py2, 2, ph, DA); fl(px2+pw-2, py2, 2, ph, DA);
  txt('OH SH++!', LW/2, py2+20, 'bold 20px monospace');
  txt(`SCORE  ${String(Math.floor(score)).padStart(5,'0')}`, LW/2, py2+40, '9px monospace', MI);
  txt(`HI     ${String(hiScore).padStart(5,'0')}`, LW/2, py2+54, '9px monospace', MI);
  const by5 = py2+ph-24;
  retBtn = { x:px2+8, y:by5, w:92, h:18 };
  shrBtn = { x:LW/2+10, y:by5, w:100, h:18 };
  fl(retBtn.x, retBtn.y, retBtn.w, retBtn.h, DA);
  txt('RETRY', retBtn.x+retBtn.w/2, by5+9, 'bold 8px monospace', LI);
  fl(shrBtn.x, shrBtn.y, shrBtn.w, shrBtn.h, MI);
  txt('SHARE ON X', shrBtn.x+shrBtn.w/2, by5+9, 'bold 8px monospace', LI);
}

// ═══════════════════════════════════════════════
// GTD SCREEN
// ═══════════════════════════════════════════════
let clmBtn = {}, skipBtn = {};

function drawGTD() {
  fl(0,0,LW,LH,LI);
  fl(0,0,LW,4,DA); fl(0,LH-4,LW,4,DA); fl(0,0,4,LH,DA); fl(LW-4,0,4,LH,DA);
  txt('★  ★  ★', LW/2, 16, '12px monospace', MI);
  txt("YOU'RE GTD", LW/2, 34, 'bold 20px monospace');
  txt(`${Math.floor(score)} PTS  ·  ${CHARS[selChar].name.toUpperCase()}`, LW/2, 50, '9px monospace', MI);
  fl(LW/2-100, 60, 200, 1, MI);
  txt('ENTER YOUR WALLET', LW/2, 72, 'bold 11px monospace');
  txt('to claim your guaranteed spot', LW/2, 84, '8px monospace', MI);
  fl(LW/2-100, 92, 200, 18, WH);
  fl(LW/2-100, 92, 200, 2, DA); fl(LW/2-100, 108, 200, 2, DA);
  fl(LW/2-100, 92, 2, 18, DA); fl(LW/2+98, 92, 2, 18, DA);
  clmBtn = { x:LW/2-65, y:116, w:130, h:20 };
  fl(clmBtn.x, clmBtn.y, clmBtn.w, clmBtn.h, DA);
  txt('CLAIM MY SPOT', LW/2, clmBtn.y+10, 'bold 10px monospace', LI);
  skipBtn = { x:LW/2-80, y:143, w:160, h:16 };
  txt('SKIP  →', LW/2, skipBtn.y+8, '8px monospace', MI);
}

function posWallet() {
  const r = screen.getBoundingClientRect();
  const sx = r.width / LW, sy = r.height / LH;
  walletEl.style.display = 'block';
  walletEl.style.left   = (r.left + (LW/2-98)*sx) + 'px';
  walletEl.style.top    = (r.top  + 92*sy)         + 'px';
  walletEl.style.width  = (196*sx) + 'px';
  walletEl.style.height = (18*sy)  + 'px';
  walletEl.style.fontSize = Math.max(9, 9*sx) + 'px';
  walletEl.focus();
}

function hideWallet() { walletEl.style.display='none'; walletEl.blur(); }

function claimShare() {
  const wall = walletEl.value.trim();
  const sh   = wall ? wall.slice(0,6)+'...'+wall.slice(-4) : 'anon';
  const t    = `I just hit 1000 on Bitkin Run 🎮\n${CHARS[selChar].name} — ${Math.floor(score)} pts\nwallet: ${sh}\n\n#Bitkin`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`);
}

// ═══════════════════════════════════════════════
// SCORE SCREEN
// ═══════════════════════════════════════════════
let rt2Btn = {}, sh2Btn = {}, bkBtn = {};

function drawScoreScreen() {
  fl(0,0,LW,LH,LI);
  fl(0,0,LW,3,DA); fl(0,LH-3,LW,3,DA); fl(0,0,3,LH,DA); fl(LW-3,0,3,LH,DA);
  txt('OH SH++!', LW/2, 24, 'bold 15px monospace');
  txt(`SCORE  ${String(Math.floor(score)).padStart(5,'0')}`, LW/2, 46, '10px monospace', MI);
  txt(`HI     ${String(hiScore).padStart(5,'0')}`, LW/2, 60, '10px monospace', MI);
  txt(`PLAYED AS: ${CHARS[selChar].name.toUpperCase()}`, LW/2, 78, '9px monospace');
  fl(LW/2-100, 88, 200, 1, DA);
  const by6 = 97;
  rt2Btn = { x:LW/2-105, y:by6, w:90, h:20 };
  sh2Btn = { x:LW/2+15,  y:by6, w:90, h:20 };
  fl(rt2Btn.x, rt2Btn.y, rt2Btn.w, rt2Btn.h, DA);
  txt('RETRY', rt2Btn.x+45, by6+10, 'bold 9px monospace', LI);
  fl(sh2Btn.x, sh2Btn.y, sh2Btn.w, sh2Btn.h, MI);
  txt('SHARE', sh2Btn.x+45, by6+10, 'bold 9px monospace', LI);
  bkBtn = { x:LW/2-70, y:125, w:140, h:18 };
  fl(bkBtn.x, bkBtn.y, bkBtn.w, bkBtn.h, LI);
  fl(bkBtn.x, bkBtn.y, bkBtn.w, 2, DA); fl(bkBtn.x, bkBtn.y+bkBtn.h-2, bkBtn.w, 2, DA);
  fl(bkBtn.x, bkBtn.y, 2, bkBtn.h, DA); fl(bkBtn.x+bkBtn.w-2, bkBtn.y, 2, bkBtn.h, DA);
  txt('← CHANGE KIN', LW/2, bkBtn.y+9, '9px monospace', MI);
  txt('SPACE TO RETRY', LW/2, LH-8, '7px monospace', MI, 'center', 'bottom');
}

function shareScore() {
  const t = `I survived ${Math.floor(score)} blocks as ${CHARS[selChar].name} 👾\ncan you beat me?\n\n#Bitkin`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`);
}

// ═══════════════════════════════════════════════
// POST-PROCESS
// ═══════════════════════════════════════════════
function postProcess() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y=0; y<LH; y+=3) ctx.fillRect(0, y, LW, 1);
  const vg = ctx.createRadialGradient(LW/2,LH/2,LH*.2,LW/2,LH/2,LH*.95);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.13)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,LW,LH);
}

// ═══════════════════════════════════════════════
// STATE ENTER
// ═══════════════════════════════════════════════
function onEnter(s) {
  switch(s) {
    case 'SELECT':
      if (localStorage.getItem('bk_mk')) CHARS[3].locked = false;
      break;
    case 'COUNTDOWN':
      cdN=3; cdT=0; score=0; spd=4;
      obs=[]; spawnT=65; mile={}; birdsOn=false; dbOn=false; gtdDone=false;
      gOff=0; PL.reset(); initBg(); hideWallet();
      break;
    case 'DEAD':
      deadT=0; deadReady=false;
      if (Math.floor(score)>hiScore) {
        hiScore=Math.floor(score); localStorage.setItem('bk_hi',hiScore);
      }
      break;
    case 'GTD':
      if (Math.floor(score)>hiScore) {
        hiScore=Math.floor(score); localStorage.setItem('bk_hi',hiScore);
      }
      setTimeout(()=>{ if(gs==='GTD') posWallet(); }, 80);
      break;
    case 'SCORE':
      hideWallet(); break;
  }
}

// ═══════════════════════════════════════════════
// CLICK / TAP
// ═══════════════════════════════════════════════
function logPos(e) {
  const r = screen.getBoundingClientRect();
  const cx = e.clientX ?? (e.changedTouches?.[0]?.clientX ?? 0);
  const cy = e.clientY ?? (e.changedTouches?.[0]?.clientY ?? 0);
  return { x:(cx-r.left)*(LW/r.width), y:(cy-r.top)*(LH/r.height) };
}

function inR(p, r) { return r&&p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }

function handleClick(e) {
  const p = logPos(e);
  switch(gs) {
    case 'GATE':
      if (inR(p,gBtn))  window.open(GATE_TWEET_URL,'_blank');
      if (inR(p,gdBtn)) go('SELECT');
      break;
    case 'SELECT':
      cBoxes.forEach((r,i) => {
        if (inR(p,r) && !CHARS[i].locked) { selChar=i; setTimeout(()=>go('COUNTDOWN'),160); }
      });
      break;
    case 'DEAD':
      if (!deadReady) return;
      if (inR(p,retBtn)) go('COUNTDOWN');
      if (inR(p,shrBtn)) shareScore();
      break;
    case 'GTD':
      if (inR(p,clmBtn)) claimShare();
      if (inR(p,skipBtn)) go('SCORE');
      break;
    case 'SCORE':
      if (inR(p,rt2Btn)) go('COUNTDOWN');
      if (inR(p,sh2Btn)) shareScore();
      if (inR(p,bkBtn))  go('SELECT');
      break;
  }
}

screen.addEventListener('click', handleClick);

screen.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (gs === 'PLAYING') {
    const ry = t.clientY / screen.getBoundingClientRect().height;
    if (ry > 0.65) IN.duck = true;
    else IN.jump = true;
  } else {
    handleClick({ clientX:t.clientX, clientY:t.clientY });
  }
}, { passive:false });

screen.addEventListener('touchend', e => {
  e.preventDefault();
  IN.duck = false; IN.jump = false;
}, { passive:false });

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,LW,LH);
  ctx.imageSmoothingEnabled = false;
  tickIN();

  switch(gs) {
    case 'GATE':
      drawGate();
      break;

    case 'SELECT':
      drawSelect();
      if (justJump && !CHARS[selChar].locked) go('COUNTDOWN');
      break;

    case 'COUNTDOWN':
      tickCD();
      drawCD();
      break;

    case 'PLAYING':
      if (justJump) PL.jump();
      PL.setDuck(IN.duck);
      PL.update(spd);
      tickScore();
      gOff += spd;
      spawnT--;
      if (spawnT <= 0) {
        mkObs();
        spawnT = Math.max(30, 90-Math.floor(spd)*3) + Math.floor(Math.random()*38);
      }
      let hit = false;
      obs.forEach(o => { o.x -= spd; if(hitTest(o)) hit=true; if(o.x+o.w<-20) o.dead=true; });
      obs = obs.filter(o => !o.dead);
      if (hit) go('DEAD');
      drawGame('run');
      break;

    case 'DEAD':
      deadT++;
      if (deadT > 44) deadReady = true;
      drawDead();
      break;

    case 'GTD':
      drawGTD();
      break;

    case 'SCORE':
      drawScoreScreen();
      break;
  }

  postProcess();
  blit();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
if (localStorage.getItem('bk_mk')) CHARS[3].locked = false;
initBg();
loop();
</script>
